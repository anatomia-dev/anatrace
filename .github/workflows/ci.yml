name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  build-test:
    name: build-test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: { node: [22, 24] }
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: '${{ matrix.node }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run build
      - run: pnpm -r run typecheck
      - run: pnpm -r run test
      - run: pnpm -r run lint
  package-correctness:
    name: package-correctness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter anatrace-core build
      - run: cd packages/core && npm pack --dry-run
      - run: cd packages/core && npx publint
      # ESM-only by design (Node >=22). Ignore the two rules that only flag the
      # intentional absence of CJS/legacy resolution: node10 (no-resolution) and
      # CJS-require-resolves-to-ESM (Node >=22 handles require(ESM) natively).
      - run: cd packages/core && npx @arethetypeswrong/cli --pack --ignore-rules cjs-resolves-to-esm no-resolution
  changeset-required:
    name: changeset-required
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # No package / public-API change without a changeset. The export-snapshot + reason value-locks
      # give this teeth: any surface change fails the snapshot test until deliberately regenerated,
      # which signals a real change that must carry a changeset. `changeset status` fails when a
      # changed package has no changeset.
      - run: pnpm exec changeset status --since=origin/main
  bunx-smoke:
    name: bunx-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - uses: oven-sh/setup-bun@v2
      - run: pnpm install --frozen-lockfile
      # The cli imports anatrace-core at module top (Runbook 2), so core must build
      # first — `pnpm --filter anatrace build` alone leaves core/dist absent and bun
      # errors "Cannot find package 'anatrace-core'". Build all packages (matches build-test).
      - run: pnpm -r run build
      # Runtime smoke: prove the built CLI runs under bun (bun executes the file
      # directly). The published `bunx anatrace` form lands once the package is on
      # npm (Runbook 2). `bunx .` does NOT work — bun parses `.` as a dep spec.
      - run: cd packages/cli && bun dist/index.mjs --version
